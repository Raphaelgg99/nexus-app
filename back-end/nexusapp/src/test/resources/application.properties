spring.datasource.url=jdbc:h2:mem:nexustest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.ai.openai.api-key=test-openai-token
api.security.token.secrets=test-jwt-secret
security.config.key=test-secret-key
security.config.expiration=86400000

JWT_SECRET=test-jwt-secret
SECRET_KEY=test-secret-key
JWT_EXPIRATION=86400000
INITIAL_ADMIN_USERNAME=test-admin
INITIAL_ADMIN_PASSWORD=test-admin-password
OPENAI_ACCESS_TOKEN=test-openai-token
NANOBANANA_ACCESS_TOKEN=test-nanobanana-token
api.nanobanana.key=test-nanobanana-token
FRONTEND_URL=http://localhost:4200
