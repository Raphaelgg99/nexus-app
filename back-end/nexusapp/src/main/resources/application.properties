spring.application.name=nexusapp
spring.config.import=optional:file:.env[.properties],optional:file:./nexusapp/.env[.properties]

#DATABASE
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#SECURITY CONFIG
api.security.token.secrets=${JWT_SECRET}
security.config.prefix=Bearer
security.config.key=${SECRET_KEY}
security.config.expiration=${JWT_EXPIRATION}

#INITIAL ADMIN SEED
# Defina INITIAL_ADMIN_USERNAME e INITIAL_ADMIN_PASSWORD no .env para criar o primeiro admin automaticamente.

#NANOBANANA
api.nanobanana.key=${NANOBANANA_ACCESS_TOKEN}

#CORS
# Em producao, defina FRONTEND_URL com a URL publica do front.

#SWAGGER
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

#OPENAI
spring.ai.openai.api-key=${OPENAI_ACCESS_TOKEN}
