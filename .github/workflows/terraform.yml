name: Terraform Infrastructure

on:
  pull_request:
    paths:
      - terraform/**
      - .github/workflows/terraform.yml
  workflow_dispatch:
    inputs:
      action:
        description: "Choose whether to only plan or to apply the infrastructure changes."
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_BACKEND_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_BACKEND_KEY: ${{ vars.TF_STATE_KEY }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION }}
  TF_VAR_project_name: ${{ vars.PROJECT_NAME }}
  TF_VAR_environment: ${{ vars.ENVIRONMENT }}
  TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_initial_admin_username: ${{ secrets.INITIAL_ADMIN_USERNAME }}
  TF_VAR_initial_admin_password: ${{ secrets.INITIAL_ADMIN_PASSWORD }}
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
  TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
  TF_VAR_openai_access_token: ${{ secrets.OPENAI_ACCESS_TOKEN }}
  TF_VAR_nanobanana_access_token: ${{ secrets.NANOBANANA_ACCESS_TOKEN }}

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    needs:
      - validate
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${TF_BACKEND_KEY}" \
            -backend-config="region=${TF_VAR_aws_region}" \
            -backend-config="use_lockfile=true"

      - name: Terraform plan
        run: terraform plan -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan

  apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs:
      - plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment: production
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${TF_BACKEND_KEY}" \
            -backend-config="region=${TF_VAR_aws_region}" \
            -backend-config="use_lockfile=true"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
