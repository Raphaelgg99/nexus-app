name: Deploy Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  BACKEND_DIR: back-end/nexusapp
  FRONTEND_DIR: front-end

jobs:
  backend_ci:
    name: Build backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn -B -ntp test

      - name: Package backend
        run: mvn -B -ntp -DskipTests package

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: back-end/nexusapp/target/*.jar
          if-no-files-found: error

  frontend_ci:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -- --configuration production

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: front-end/dist/nexus-front/browser
          if-no-files-found: error

  deploy_backend:
    name: Deploy backend to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs:
      - backend_ci
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-artifact

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Elastic Beanstalk runtime settings
        shell: bash
        env:
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_NAME: ${{ vars.DB_NAME }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          JWT_EXPIRATION: ${{ vars.JWT_EXPIRATION }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          INITIAL_ADMIN_USERNAME: ${{ secrets.INITIAL_ADMIN_USERNAME }}
          INITIAL_ADMIN_PASSWORD: ${{ secrets.INITIAL_ADMIN_PASSWORD }}
          OPENAI_ACCESS_TOKEN: ${{ secrets.OPENAI_ACCESS_TOKEN }}
          NANOBANANA_ACCESS_TOKEN: ${{ secrets.NANOBANANA_ACCESS_TOKEN }}
        run: |
          aws elasticbeanstalk describe-configuration-settings \
            --application-name "${{ vars.EB_APPLICATION_NAME }}" \
            --environment-name "${{ vars.EB_ENVIRONMENT_NAME }}" \
            > eb-current-settings.json

          python <<'PY'
          import json
          import os

          with open("eb-current-settings.json", encoding="utf-8") as fh:
              payload = json.load(fh)

          option_settings = payload["ConfigurationSettings"][0]["OptionSettings"]
          current = {
              item["OptionName"]: item.get("Value", "")
              for item in option_settings
              if item.get("Namespace") == "aws:elasticbeanstalk:application:environment"
          }

          def pick(source_name, option_name, fallback=""):
              value = os.getenv(source_name)
              if value not in (None, ""):
                  return value
              return current.get(option_name, fallback)

          managed = {
              "POSTGRES_HOST": pick("DB_HOST", "POSTGRES_HOST"),
              "POSTGRES_PORT": pick("DB_PORT", "POSTGRES_PORT", "5433"),
              "POSTGRES_DB": pick("DB_NAME", "POSTGRES_DB", "nexuschatbot_db"),
              "POSTGRES_USER": pick("DB_USERNAME", "POSTGRES_USER"),
              "POSTGRES_PASSWORD": pick("DB_PASSWORD", "POSTGRES_PASSWORD"),
              "JWT_SECRET": pick("JWT_SECRET", "JWT_SECRET"),
              "SECRET_KEY": pick("SECRET_KEY", "SECRET_KEY"),
              "JWT_EXPIRATION": pick("JWT_EXPIRATION", "JWT_EXPIRATION", "86400000"),
              "INITIAL_ADMIN_USERNAME": pick("INITIAL_ADMIN_USERNAME", "INITIAL_ADMIN_USERNAME"),
              "INITIAL_ADMIN_PASSWORD": pick("INITIAL_ADMIN_PASSWORD", "INITIAL_ADMIN_PASSWORD"),
              "OPENAI_ACCESS_TOKEN": pick("OPENAI_ACCESS_TOKEN", "OPENAI_ACCESS_TOKEN"),
              "NANOBANANA_ACCESS_TOKEN": pick("NANOBANANA_ACCESS_TOKEN", "NANOBANANA_ACCESS_TOKEN"),
              "FRONTEND_URL": pick("FRONTEND_URL", "FRONTEND_URL"),
              "PORT": current.get("PORT", "5000"),
              "SERVER_PORT": current.get("SERVER_PORT", "5000"),
          }

          rendered = [
              {
                  "Namespace": "aws:elasticbeanstalk:application:environment",
                  "OptionName": key,
                  "Value": value,
              }
              for key, value in managed.items()
              if value != ""
          ]

          with open("eb-option-settings.json", "w", encoding="utf-8") as fh:
              json.dump(rendered, fh)
          PY

      - name: Create Elastic Beanstalk source bundle
        shell: bash
        run: |
          JAR_PATH="$(find backend-artifact -name '*.jar' | head -n 1)"
          mkdir -p backend-deploy
          cp "$JAR_PATH" backend-deploy/app.jar
          printf 'web: java -Dserver.port=$PORT -jar app.jar\n' > backend-deploy/Procfile
          cd backend-deploy
          zip -r ../backend-deploy.zip .

      - name: Upload source bundle to S3
        shell: bash
        run: |
          VERSION_LABEL="${GITHUB_SHA}"
          S3_KEY="backend/${VERSION_LABEL}.zip"
          aws s3 cp backend-deploy.zip "s3://${{ vars.EB_ARTIFACT_BUCKET }}/${S3_KEY}"
          echo "VERSION_LABEL=${VERSION_LABEL}" >> "$GITHUB_ENV"
          echo "S3_KEY=${S3_KEY}" >> "$GITHUB_ENV"

      - name: Create application version if needed
        shell: bash
        run: |
          EXISTING_VERSION="$(aws elasticbeanstalk describe-application-versions \
            --application-name "${{ vars.EB_APPLICATION_NAME }}" \
            --version-labels "${{ env.VERSION_LABEL }}" \
            --query 'ApplicationVersions[0].VersionLabel' \
            --output text)"

          if [ "${EXISTING_VERSION}" = "${{ env.VERSION_LABEL }}" ]; then
            echo "Elastic Beanstalk application version ${VERSION_LABEL} already exists. Reusing it."
            exit 0
          fi

          aws elasticbeanstalk create-application-version \
            --application-name "${{ vars.EB_APPLICATION_NAME }}" \
            --version-label "${{ env.VERSION_LABEL }}" \
            --source-bundle S3Bucket="${{ vars.EB_ARTIFACT_BUCKET }}",S3Key="${{ env.S3_KEY }}"

      - name: Deploy application version
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "${{ vars.EB_ENVIRONMENT_NAME }}" \
            --version-label "${{ env.VERSION_LABEL }}" \
            --option-settings file://eb-option-settings.json

      - name: Wait for environment update
        run: |
          aws elasticbeanstalk wait environment-updated \
            --environment-names "${{ vars.EB_ENVIRONMENT_NAME }}"

      - name: Verify environment health
        shell: bash
        run: |
          STATUS="$(aws elasticbeanstalk describe-environments \
            --environment-names "${{ vars.EB_ENVIRONMENT_NAME }}" \
            --query 'Environments[0].Status' \
            --output text)"
          HEALTH="$(aws elasticbeanstalk describe-environments \
            --environment-names "${{ vars.EB_ENVIRONMENT_NAME }}" \
            --query 'Environments[0].Health' \
            --output text)"

          echo "Elastic Beanstalk status: ${STATUS}"
          echo "Elastic Beanstalk health: ${HEALTH}"

          if [ "${STATUS}" != "Ready" ]; then
            echo "Elastic Beanstalk environment is not Ready."
            exit 1
          fi

          if [ "${HEALTH}" = "Yellow" ]; then
            echo "Elastic Beanstalk environment health is Yellow. Proceeding with a warning."
            exit 0
          fi

          if [ "${HEALTH}" != "Green" ] && [ "${HEALTH}" != "Ok" ]; then
            echo "Elastic Beanstalk environment health is not healthy enough for a successful deploy."
            exit 1
          fi

  deploy_frontend:
    name: Deploy frontend to S3 and CloudFront
    runs-on: ubuntu-latest
    needs:
      - frontend_ci
    environment: production

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload static assets with long cache
        run: |
          aws s3 sync frontend-dist "s3://${{ vars.FRONTEND_BUCKET }}" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

      - name: Upload index.html with no-cache
        run: |
          aws s3 cp frontend-dist/index.html "s3://${{ vars.FRONTEND_BUCKET }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
