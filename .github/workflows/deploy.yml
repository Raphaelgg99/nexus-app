name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  BACKEND_DIR: back-end/nexusapp
  FRONTEND_DIR: front-end

jobs:
  backend_ci:
    name: Test backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn -B -ntp test

  frontend_ci:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -- --configuration production

  build_images:
    name: Build and push images
    runs-on: ubuntu-latest
    needs:
      - backend_ci
      - frontend_ci
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image names
        id: images
        shell: bash
        run: |
          IMAGE_PREFIX="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "backend_image=${IMAGE_PREFIX}/backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${IMAGE_PREFIX}/frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_latest=${IMAGE_PREFIX}/backend:latest" >> "$GITHUB_OUTPUT"
          echo "frontend_latest=${IMAGE_PREFIX}/frontend:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_DIR }}
          push: true
          tags: |
            ${{ steps.images.outputs.backend_image }}
            ${{ steps.images.outputs.backend_latest }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.FRONTEND_DIR }}
          push: true
          tags: |
            ${{ steps.images.outputs.frontend_image }}
            ${{ steps.images.outputs.frontend_latest }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs:
      - build_images
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy files
        shell: bash
        env:
          BACKEND_IMAGE: ${{ needs.build_images.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build_images.outputs.frontend_image }}
          HTTP_PORT: ${{ vars.HTTP_PORT }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSL_MODE: ${{ secrets.DB_SSL_MODE }}
          DB_JDBC_PARAMS: ${{ secrets.DB_JDBC_PARAMS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
          INITIAL_ADMIN_USERNAME: ${{ secrets.INITIAL_ADMIN_USERNAME }}
          INITIAL_ADMIN_PASSWORD: ${{ secrets.INITIAL_ADMIN_PASSWORD }}
          OPENAI_ACCESS_TOKEN: ${{ secrets.OPENAI_ACCESS_TOKEN }}
          NANOBANANA_ACCESS_TOKEN: ${{ secrets.NANOBANANA_ACCESS_TOKEN }}
        run: |
          mkdir -p deploy-files
          cp docker-compose.production.yml deploy-files/docker-compose.yml
          {
            echo "BACKEND_IMAGE=${BACKEND_IMAGE}"
            echo "FRONTEND_IMAGE=${FRONTEND_IMAGE}"
            echo "HTTP_PORT=${HTTP_PORT:-80}"
            echo "FRONTEND_URL=${FRONTEND_URL}"
            echo "POSTGRES_HOST=${DB_HOST}"
            echo "POSTGRES_PORT=${DB_PORT:-5432}"
            echo "POSTGRES_DB=${DB_NAME}"
            echo "POSTGRES_USER=${DB_USERNAME}"
            echo "POSTGRES_PASSWORD=${DB_PASSWORD}"
            echo "POSTGRES_SSL_MODE=${DB_SSL_MODE:-require}"
            echo "POSTGRES_JDBC_PARAMS=${DB_JDBC_PARAMS}"
            echo "JWT_SECRET=${JWT_SECRET}"
            echo "SECRET_KEY=${SECRET_KEY}"
            echo "JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}"
            echo "INITIAL_ADMIN_USERNAME=${INITIAL_ADMIN_USERNAME}"
            echo "INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD}"
            echo "OPENAI_ACCESS_TOKEN=${OPENAI_ACCESS_TOKEN}"
            echo "NANOBANANA_ACCESS_TOKEN=${NANOBANANA_ACCESS_TOKEN}"
          } > deploy-files/.env.production

      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy-files/*,deploy-files/.env.production"
          target: ${{ secrets.VPS_APP_DIR || '/opt/nexus-app' }}
          strip_components: 1

      - name: Restart services on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR || '/opt/nexus-app' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: GHCR_USERNAME,GHCR_TOKEN,VPS_APP_DIR
          script: |
            set -e
            cd "$VPS_APP_DIR"
            if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            docker compose --env-file .env.production pull
            docker compose --env-file .env.production up -d --remove-orphans
            docker compose --env-file .env.production ps
