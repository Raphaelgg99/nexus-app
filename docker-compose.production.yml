services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/OWNER/REPOSITORY/backend:latest}
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SSL_MODE: ${POSTGRES_SSL_MODE:-require}
      POSTGRES_JDBC_PARAMS: ${POSTGRES_JDBC_PARAMS:-}
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY: ${SECRET_KEY}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN}
      NANOBANANA_ACCESS_TOKEN: ${NANOBANANA_ACCESS_TOKEN}
      FRONTEND_URL: ${FRONTEND_URL}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/OWNER/REPOSITORY/frontend:latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8088}:80"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-nexusivbedtech.sbs}
    ports:
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
